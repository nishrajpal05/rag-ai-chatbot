<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RAG Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Local RAG Assistant</h1>
            <div class="status-bar">
                <span id="status-indicator" class="status-dot"></span>
                <span id="status-text">Initializing...</span>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>📄 Upload Document</h3>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.txt" hidden>
                        <label for="fileInput" class="upload-label">
                            <div class="upload-icon">📁</div>
                            <p>Click to upload</p>
                            <small>PDF, DOCX, XLSX, TXT</small>
                        </label>
                    </div>
                    <div id="uploadStatus" class="status-message"></div>
                </div>

                <div class="sidebar-section">
                    <h3> Scrape Website</h3>
                    <input type="url" id="urlInput" placeholder="https://example.com" class="url-input">
                    <button id="scrapeBtn" class="btn btn-primary">Scrape URL</button>
                    <div id="scrapeStatus" class="status-message"></div>
                </div>

                <div class="sidebar-section">
                    <h3> Knowledge Base</h3>
                    <div id="kbStats" class="kb-stats">
                        <p><strong>Documents:</strong> <span id="docCount">0</span></p>
                        <p><strong>Chunks:</strong> <span id="chunkCount">0</span></p>
                    </div>
                    <button id="clearBtn" class="btn btn-secondary">Clear All</button>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-container">
                <div id="chatMessages" class="chat-messages">
                    <div class="welcome-message">
                        <h2>Welcome!</h2>
                        <p>Upload a document or scrape a website to get started.</p>
                        <p>Then ask me anything about the content.</p>
                    </div>
                </div>


    <script src="/static/script.js"></script>
</body>
</html>
